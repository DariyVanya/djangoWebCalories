{% extends "main/layout.html" %}
{% load static %}
{% load l10n %}

{% block title %}
	Редагування профілю
{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'user/css/user.css' %}">
{% endblock %}

{% block content %}
    <div class="user-profile-hero">
        <div class="user-profile-hero-text">
            <h1>Редагування профілю</h1>
            <p>Оновіть ваші параметри профілю</p>
        </div>
    </div>

	<form method="post" action="{% url 'user:edit_profile' user_id %}">
		{% csrf_token %}

		<div class="mb-3">
			<label for="first_name" class="form-label">Ім'я</label>
			<input id="first_name" type="text" maxlength="150" class="form-control" name="first_name" value="{{ details.user.first_name }}">
		</div>

		<div class="mb-3">
			<label for="last_name" class="form-label">Прізвище</label>
			<input id="last_name" type="text" maxlength="150" class="form-control" name="last_name" value="{{ details.user.last_name }}">
		</div>

            <div class="mb-3">
                <label for="age" class="form-label">Вік</label>
                <input id="age" type="number" min="1" max="120" class="form-control" name="age" value="{{ details.age }}" required>
            </div>

        <div class="mb-3">
                <label for="sex" class="form-label">Стать</label>
                <select id="sex" name="sex" class="form-select" required>
                    <option value="male" {% if details.sex == 'male' %}selected{% endif %}>Чоловік</option>
                    <option value="female" {% if details.sex == 'female' %}selected{% endif %}>Жінка</option>
                </select>
        </div>

		<div class="mb-3">
			<label for="height_cm" class="form-label">Зріст (см)</label>
			<input id="height_cm" type="number" min="50" max="260" class="form-control" name="height_cm" value="{{ details.height_cm }}" required>
		</div>

		<div class="mb-3">
			<label for="weight_kg" class="form-label">Вага (кг)</label>
            <input id="weight_kg" type="number" min="20" max="400" step="0.1" class="form-control" name="weight_kg" value="{{ details.weight_kg|unlocalize }}" required>
		</div>

		<div class="mb-3">
			<label for="activity_level" class="form-label">Рівень активності</label>
			<select id="activity_level" name="activity_level" class="form-select" required>
				<option value="1" {% if details.activity_level == 1 %}selected{% endif %}>Sedentary</option>
				<option value="2" {% if details.activity_level == 2 %}selected{% endif %}>Lightly active</option>
				<option value="3" {% if details.activity_level == 3 %}selected{% endif %}>Moderately active</option>
				<option value="4" {% if details.activity_level == 4 %}selected{% endif %}>Very active</option>
				<option value="5" {% if details.activity_level == 5 %}selected{% endif %}>Extra active</option>
			</select>
		</div>

		<div class="mb-3">
			<label for="calorie_plan" class="form-label">План калорій</label>
			<select id="calorie_plan" name="calorie_plan" class="form-select" required>
				<option value="cut" {% if details.calorie_plan == 'cut' %}selected{% endif %}>Похудання (дефіцит 200–300 ккал)</option>
				<option value="maintain" {% if details.calorie_plan == 'maintain' %}selected{% endif %}>Статичний</option>
				<option value="bulk" {% if details.calorie_plan == 'bulk' %}selected{% endif %}>Набір ваги (профіцит 200–300 ккал)</option>
			</select>
		</div>

        <div class="mb-3">
            <label for="goal_calories" class="form-label">Цільові калорії (ккал)</label>
            <div class="input-group">
                <input id="goal_calories" type="number" min="1000" max="10000" class="form-control" name="goal_calories" value="{{ details.goal_calories }}" required>
                <button type="button" class="btn btn-outline-success" id="btn-calc-goal">Розрахувати</button>
            </div>
        </div>

        <script>
        function calcGoalCalories(sex, age, heightCm, weightKg, activityLevel, caloriePlan) {
            let bmr;
            if (sex === "male") {
                bmr = 10 * weightKg + 6.25 * heightCm - 5 * age + 5;
            } else {
                bmr = 10 * weightKg + 6.25 * heightCm - 5 * age - 161;
            }

            const factors = { 1: 1.2, 2: 1.375, 3: 1.55, 4: 1.725, 5: 1.9 };
            const planShift = { cut: -250, maintain: 0, bulk: 250 };
            const maintenance = bmr * (factors[activityLevel] ?? 1.2);
            const target = maintenance + (planShift[caloriePlan] ?? 0);
            const roundedToHundred = Math.round(target / 100) * 100;
            return Math.max(1000, roundedToHundred);
        }

        document.getElementById("btn-calc-goal").addEventListener("click", () => {
            const sex      = document.getElementById("sex").value;
            const age      = parseInt(document.getElementById("age").value);
            const height   = parseInt(document.getElementById("height_cm").value);
            const weight   = parseFloat(document.getElementById("weight_kg").value);
            const activity = parseInt(document.getElementById("activity_level").value);
            const caloriePlan = document.getElementById("calorie_plan").value;

            if (!sex || isNaN(age) || isNaN(height) || isNaN(weight) || isNaN(activity) || !caloriePlan) {
                alert("Заповніть усі фізіологічні поля перед розрахунком.");
                return;
            }

            document.getElementById("goal_calories").value = calcGoalCalories(sex, age, height, weight, activity, caloriePlan);
        });
        </script>


		<div class="d-flex gap-2">
			<button type="submit" class="btn btn-primary">Зберегти</button>
			<a href="{% url 'user:user_detail' user_id %}" class="btn btn-outline-secondary">Скасувати</a>
		</div>
	</form>
{% endblock %}
